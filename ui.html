<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 12px Inter, sans-serif;
        margin: 0;
        padding: 16px;
        color: #111;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }

      .primary {
        background: #111;
        color: white;
      }

      .secondary {
        background: #eee;
        color: #111;
      }

      select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }

      textarea {
        width: 100%;
        height: 500px;
        box-sizing: border-box;
        font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        resize: none;
      }

      .status {
        margin-bottom: 12px;
        color: #666;
      }

      label {
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <button id="export" class="primary">Exporter en CSS</button>
      <button id="copy" class="secondary">Copier</button>
      <button id="close" class="secondary">Fermer</button>

      <label for="mode">Mode :</label>
      <select id="mode">
        <option value="preserve" selected>Preserve aliases</option>
        <option value="resolved">Resolve final values</option>
      </select>
    </div>

    <div class="status" id="status">Prêt.</div>
    <textarea id="output" spellcheck="false"></textarea>

    <script>
      const output = document.getElementById("output");
      const statusEl = document.getElementById("status");
      const modeEl = document.getElementById("mode");

      document.getElementById("export").onclick = () => {
        statusEl.textContent = "Export en cours…";
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-css",
              outputMode: modeEl.value,
            },
          },
          "*"
        );
      };

      document.getElementById("copy").onclick = async () => {
        try {
          await navigator.clipboard.writeText(output.value);
          statusEl.textContent = "CSS copié.";
        } catch {
          output.select();
          document.execCommand("copy");
          statusEl.textContent = "CSS copié.";
        }
      };

      document.getElementById("close").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "css-result") {
          output.value = msg.css;
          statusEl.textContent = "Export terminé.";
        }

        if (msg.type === "error") {
          statusEl.textContent = "Erreur : " + msg.message;
        }
      };
    </script>
  </body>
</html>
